<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaTravel | Viaja mas, preocupate menos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      :root {
        --brand-blue: #0a4b78;
        --brand-turquoise: #16bfb5;
        --brand-orange: #ff8a3d;
        --brand-light: #f5fbff;
        --text-main: #1b2a34;
      }

      body {
        font-family: "Source Sans 3", sans-serif;
        color: var(--text-main);
        background: radial-gradient(circle at top right, #dff8ff 0%, #ffffff 40%);
      }

      h1,
      h2,
      h3,
      .navbar-brand {
        font-family: "Montserrat", sans-serif;
      }

      .navbar {
        backdrop-filter: blur(8px);
        background-color: rgba(255, 255, 255, 0.92);
      }

      .hero {
        min-height: 90vh;
        background:
          linear-gradient(115deg, rgba(10, 75, 120, 0.86), rgba(22, 191, 181, 0.62)),
          url("https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=1600&q=80")
            center / cover no-repeat;
        color: #fff;
        display: flex;
        align-items: center;
      }

      .hero-badge,
      .offer-chip {
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.35);
      }

      .section-soft {
        background-color: var(--brand-light);
      }

      .value-card,
      .destination-card,
      .testimonial-card,
      .trust-card {
        border: 0;
        border-radius: 1rem;
        box-shadow: 0 10px 30px rgba(3, 27, 45, 0.08);
        transition: transform 0.28s ease, box-shadow 0.28s ease;
      }

      .value-card:hover,
      .destination-card:hover,
      .testimonial-card:hover,
      .trust-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 16px 34px rgba(3, 27, 45, 0.16);
      }

      .destination-card img {
        height: 210px;
        object-fit: cover;
      }

      .btn-cta {
        background-color: var(--brand-orange);
        border-color: var(--brand-orange);
        color: #fff;
      }

      .btn-cta:hover,
      .btn-cta:focus {
        background-color: #ff7722;
        border-color: #ff7722;
        color: #fff;
      }

      .btn-outline-light:hover {
        color: var(--brand-blue);
      }

      .icon-circle {
        width: 54px;
        height: 54px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background-color: rgba(22, 191, 181, 0.12);
        color: var(--brand-blue);
        font-size: 1.3rem;
      }

      .brand-logo {
        border: 1px dashed rgba(10, 75, 120, 0.25);
        border-radius: 12px;
        padding: 0.9rem 1rem;
        background: #fff;
        font-weight: 700;
        color: var(--brand-blue);
      }

      .section-title {
        color: var(--brand-blue);
      }

      .urgent-strip {
        background: linear-gradient(90deg, #ff8a3d, #ff5f5f);
        color: #fff;
      }

      .floating-cta {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        z-index: 1040;
      }

      @media (max-width: 991px) {
        .hero {
          min-height: 85vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
